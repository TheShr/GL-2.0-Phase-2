version: '3.8'

services:
  # Next.js/TanStack Start dashboard server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_MAPPLS_TOKEN=${NEXT_PUBLIC_MAPPLS_TOKEN:-rysmqsqzhyrdjzzdhxthpgdljebmkdipyjmb}
      - MAPPLS_TOKEN=${MAPPLS_TOKEN:-rysmqsqzhyrdjzzdhxthpgdljebmkdipyjmb}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - BACKEND_OUTPUT_DIR=/app/backend/output
    volumes:
      - backend_output:/app/backend/output:ro
    depends_on:
      backend-init:
        condition: service_completed_successfully

  # Initializes GNN model weights and schedules on compose startup
  backend-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - MAPPLS_TOKEN=${MAPPLS_TOKEN:-rysmqsqzhyrdjzzdhxthpgdljebmkdipyjmb}
    volumes:
      - backend_output:/app/output

volumes:
  backend_output:
